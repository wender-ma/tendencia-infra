<!-- Template: formulário de aditivo manual -->
<template id="tpl-manual-form">
  <form data-modal-form="manual">
  <h2>➕ Novo aditivo manual</h2>
  <div class="meta">Item ainda não criado no sistema Flow. Será marcado com ID <strong class="id-placeholder"></strong>.</div>
  <div class="form-grid">
    <div>
      <label for="m_dep">Departamento</label>
      <select id="m_dep" required><option value="">-</option></select>
    </div>
    <div>
      <label for="m_data">Data (dd/mm/aaaa)</label>
      <input type="text" id="m_data" placeholder="">
    </div>
    <div class="full">
      <label for="m_desc">Descrição</label>
      <textarea id="m_desc" required placeholder="Ex: Aumento previsto - revisão paisagismo Q2"></textarea>
    </div>
    <div>
      <label for="m_motivo">Motivo</label>
      <select id="m_motivo">
        <option value="">— Selecione o motivo —</option>
      </select>
    </div>
    <div>
      <label for="m_valor">Fluxo Planejamento (R$)</label>
      <input type="text" id="m_valor" placeholder="ex: 12.500,00 ou -5000">
    </div>
    <div>
      <label for="m_dest">→ Destino (Insumo Planejamento)</label>
      <input type="text" id="m_dest" list="insumosDatalist" placeholder="digite p/ buscar...">
    </div>
    <div>
      <label for="m_orig">← Origem (Insumo Remanejamento)</label>
      <input type="text" id="m_orig" list="insumosDatalist" placeholder="digite p/ buscar...">
    </div>
    <div class="full">
      <label for="m_just">Justificativa (opcional)</label>
      <textarea id="m_just" placeholder="Detalhe técnico, links de projeto, etc."></textarea>
    </div>
  </div>
  <div class="form-actions">
    <button type="button" class="btn-sm" data-click-action="closeModal">Cancelar</button>
    <button type="submit" class="btn-sm primary" data-action="save-manual" data-n="">💾 Salvar aditivo manual</button>
  </div>
  </form>
</template>

<div class="modal-bg" id="modalBg" aria-hidden="true" data-click-action="closeModal" data-backdrop-dismiss="true">
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Janela do dashboard" tabindex="-1">
    <button type="button" class="modal-close" data-click-action="closeModal" aria-label="Fechar janela">×</button>
    <div id="modalContent"></div>
  </div>
</div>

<div class="modal-bg" id="confirmModalBg" aria-hidden="true" data-click-action="closeConfirmModal" data-action-mode="bool" data-action-arg="false" data-backdrop-dismiss="true">
  <div class="modal modal--confirm" id="confirmModalDialog" role="dialog" aria-modal="true" aria-label="Confirmação" tabindex="-1">
    <button type="button" class="modal-close" data-click-action="closeConfirmModal" data-action-mode="bool" data-action-arg="false" aria-label="Fechar confirmação">×</button>
    <div id="confirmModalContent"></div>
  </div>
</div>

<!-- v0.62: Modal de login/cadastro -->
<div id="loginModalBackdrop" class="standalone-modal-bg standalone-modal-bg--login" aria-hidden="true" data-click-action="closeLoginModal" data-backdrop-dismiss="true">
  <div class="standalone-modal standalone-modal--login" role="dialog" aria-modal="true" aria-labelledby="loginModalTitle" tabindex="-1">
    <div class="modal-heading-row">
      <h2 id="loginModalTitle" class="modal-heading">🔐 Acesso ao Dashboard</h2>
      <button type="button" class="icon-close" data-click-action="closeLoginModal" aria-label="Fechar acesso ao dashboard" title="Fechar">×</button>
    </div>

    <!-- Tabs Login / Signup -->
    <div class="login-tabs" role="tablist" aria-label="Forma de acesso">
      <button id="loginTabLogin" class="login-tab active" type="button" role="tab" aria-selected="true" aria-controls="loginPanelLogin" data-click-action="switchLoginTab" data-action-mode="arg" data-action-arg="login">Entrar</button>
      <button id="loginTabSignup" class="login-tab" type="button" role="tab" aria-selected="false" aria-controls="loginPanelSignup" tabindex="-1" data-click-action="switchLoginTab" data-action-mode="arg" data-action-arg="signup">Criar conta</button>
    </div>

    <!-- PAINEL LOGIN -->
    <div id="loginPanelLogin" role="tabpanel" aria-labelledby="loginTabLogin">
      <button type="button" class="login-provider-button" data-click-action="doSignInGoogle">
        <span class="provider-icon">🔷</span> Entrar com Google
      </button>
      <div class="login-divider">
        <span>ou com email</span>
      </div>
      <form id="loginEmailForm" class="auth-form" data-submit-action="doSignInEmail">
        <div>
          <label for="loginEmail" class="field-label">Email</label>
          <input type="email" id="loginEmail" autocomplete="email" required class="field-control">
        </div>
        <div>
          <label for="loginSenha" class="field-label">Senha</label>
          <input type="password" id="loginSenha" autocomplete="current-password" required class="field-control">
        </div>
        <div id="loginErro" class="form-error" role="alert" aria-live="assertive"></div>
        <button type="submit" class="btn-sm primary btn-block">Entrar</button>
      </form>
    </div>

    <!-- PAINEL SIGNUP -->
    <div id="loginPanelSignup" role="tabpanel" aria-labelledby="loginTabSignup" hidden>
      <p class="signup-intro">
        Sua conta será criada como <strong>"aguardando aprovação"</strong>. Um administrador precisa liberar seu acesso pra editar dados.
      </p>
      <form id="signupEmailForm" class="auth-form" data-submit-action="doSignUpEmail">
        <div>
          <label for="signupNome" class="field-label">Nome (opcional)</label>
          <input type="text" id="signupNome" autocomplete="name" class="field-control">
        </div>
        <div>
          <label for="signupEmail" class="field-label">Email <span class="required-mark">*</span></label>
          <input type="email" id="signupEmail" autocomplete="email" required class="field-control">
        </div>
        <div>
          <label for="signupSenha" class="field-label">Senha <span class="required-mark">*</span></label>
          <input type="password" id="signupSenha" autocomplete="new-password" minlength="6" required class="field-control">
          <div class="field-help">Mínimo 6 caracteres.</div>
        </div>
        <div>
          <label for="signupSenha2" class="field-label">Confirmar senha <span class="required-mark">*</span></label>
          <input type="password" id="signupSenha2" autocomplete="new-password" minlength="6" required class="field-control">
        </div>
        <div id="signupErro" class="form-error" role="alert" aria-live="assertive"></div>
        <button type="submit" class="btn-sm primary btn-block">Criar conta</button>
      </form>
    </div>
  </div>
</div>
