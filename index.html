<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Dashboard interno para acompanhamento de tendência orçamentária, gestão, aditivos e projeções de obras.">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>FGR · Dashboard de Tendência</title>
<link rel="icon" type="image/png" href="assets/images/favicon.png">
<meta name="theme-color" content="#0a0a0a">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/dashboard.css">
<script type="module" src="assets/js/bootstrap.js"></script>
</head>
<body>
<a class="skip-link" href="#mainContent">Pular para o conteúdo principal</a>
<div id="chartTooltip" role="tooltip" aria-hidden="true"></div>

<header class="page-header">
<div class="header">
  <!-- v0.64.1: Logo FGR -->
  <img class="header-logo" src="assets/images/logo-fgr.png" alt="FGR Incorporações" width="84" height="44">
  <div class="header-main">
    <div class="header-title-row">
      <span id="headerTitle" class="header-title-text">Tendência Orçamentária</span>
      <button id="headerLockBtn" class="header-edit-button" type="button" data-click-action="toggleHeaderEdit" data-requires-edit data-admin-control title="Editar título">🔒 Editar</button>
    </div>
    <!-- v0.58a: nome grande da obra + dropdown -->
    <div class="header-project-row">
      <h1 id="obraNomeGrande" class="header-project-name">📊 —</h1>
      <select id="obraSelector" class="project-selector" data-change-action="trocarObra" data-action-mode="value" title="Trocar de obra" aria-label="Obra ativa">
        <option value="">Carregando obras...</option>
      </select>
    </div>
    <div class="subtitle">Orçamento × Gestão × Aditivos (Flows) | <span id="dataRef">—</span></div>
  </div>
  <div class="header-actions">
    <span id="supaBadge" class="sync-badge" role="status" aria-live="polite" aria-atomic="true">🔗 Conectando...</span>
    <span id="authBadge" class="auth-badge pending" role="status" aria-live="polite" aria-atomic="true" title="Verificando autenticação...">⏳ ...</span>
    <button id="authBtn" class="auth-btn" data-click-action="handleAuthClick" title="Entrar para editar">🔑 Entrar</button>
    <button id="themeToggle" class="theme-toggle" data-click-action="toggleTheme" title="Alternar modo claro/escuro" aria-label="Alternar modo claro ou escuro">🌙</button>
    <button class="btn" data-click-action="print">🖨️ Imprimir</button>
  </div>
</div>

<!-- v0.58a: Estilo do dropdown de obras nas <option> -->

<nav class="tabs" role="tablist" aria-label="Seções do dashboard">
  <button type="button" class="tab active" id="tab-btn-visao" data-tab="visao" role="tab" aria-controls="tab-visao" aria-selected="true" tabindex="0">📈 Visão Geral</button>
  <button type="button" class="tab" id="tab-btn-flows" data-tab="flows" role="tab" aria-controls="tab-flows" aria-selected="false" tabindex="-1">🔗 Flows / Aditivos</button>
  <button type="button" class="tab" id="tab-btn-projecao" data-tab="projecao" role="tab" aria-controls="tab-projecao" aria-selected="false" tabindex="-1">🔮 Tendência de Obra</button>
  <button type="button" class="tab" id="tab-btn-projecao_ctrl" data-tab="projecao_ctrl" role="tab" aria-controls="tab-projecao_ctrl" aria-selected="false" tabindex="-1">📦 Controle Projeção</button>
  <button type="button" class="tab" id="tab-btn-detalhe" data-tab="detalhe" role="tab" aria-controls="tab-detalhe" aria-selected="false" tabindex="-1">📋 Detalhamento</button>
  <button type="button" class="tab" id="tab-btn-historico" data-tab="historico" role="tab" aria-controls="tab-historico" aria-selected="false" tabindex="-1">📅 Histórico Mensal</button>
  <button type="button" class="tab" id="tab-btn-uploads" data-tab="uploads" role="tab" aria-controls="tab-uploads" aria-selected="false" tabindex="-1">📤 Uploads</button>
  <button type="button" class="tab" id="tab-btn-admin" data-tab="admin" data-admin-only role="tab" aria-controls="tab-admin" aria-selected="false" tabindex="-1">⚙️ Admin</button>
  <button type="button" class="tab" id="tab-btn-manual" data-tab="manual" role="tab" aria-controls="tab-manual" aria-selected="false" tabindex="-1">ℹ️ Manual</button>
</nav>
</header><!-- /page-header -->

<!-- Loading overlay -->
<div id="loadingOverlay" class="loading-overlay" role="status" aria-live="polite" aria-label="Carregando dados" aria-hidden="true">
  <div class="loading-spinner" aria-hidden="true"></div>
</div>

<main id="mainContent" class="page-body" tabindex="-1">

<!-- VISÃO GERAL -->
<section class="tab-content active" id="tab-visao" role="tabpanel" aria-labelledby="tab-btn-visao" tabindex="0">
</section>

<!-- DETALHAMENTO -->
<section class="tab-content" id="tab-detalhe" role="tabpanel" aria-labelledby="tab-btn-detalhe" tabindex="0">
</section>

<!-- FLOWS -->
<section class="tab-content" id="tab-flows" role="tabpanel" aria-labelledby="tab-btn-flows" tabindex="0">
</section>

<!-- HISTÓRICO -->
<section class="tab-content" id="tab-historico" role="tabpanel" aria-labelledby="tab-btn-historico" tabindex="0">
</section>

<!-- PROJEÇÃO / TENDÊNCIA DE OBRA -->
<section class="tab-content" id="tab-projecao" role="tabpanel" aria-labelledby="tab-btn-projecao" tabindex="0">
</section>

<!-- CONTROLE PROJEÇÃO -->
<section class="tab-content" id="tab-projecao_ctrl" role="tabpanel" aria-labelledby="tab-btn-projecao_ctrl" tabindex="0">
</section>

<!-- UPLOADS (v0.52) -->
<section class="tab-content" id="tab-uploads" role="tabpanel" aria-labelledby="tab-btn-uploads" tabindex="0">
</section>

<!-- ADMIN (só admin geral) -->
<section class="tab-content" id="tab-admin" role="tabpanel" aria-labelledby="tab-btn-admin" tabindex="0">
</section>

<!-- MANUAL -->
<section class="tab-content" id="tab-manual" role="tabpanel" aria-labelledby="tab-btn-manual" tabindex="0">
</section>

<!-- Modal de detalhes do item -->
</main><!-- /page-body -->

<div id="dialogMount"></div>

<footer class="footer">
  Dashboard v0.64.8 · Gerado em <span id="now"></span> · Fontes: TENDÊNCIA + FlowsValor · Dados sincronizados via Supabase
</footer>

<!-- JavaScript principal carregado por assets/js/bootstrap.js -->


</body>
</html>
